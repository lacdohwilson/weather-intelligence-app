# .github/workflows/main.yml
name: Weather Intelligence App CI/CD Pipeline

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build --if-present

      - name: Notify on failure
        if: failure()
        run: echo "Build failed! Please check the logs for details." # TODO: Integrate with a notification service like Slack or email for better visibility
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          ./trivy fs . --format json --output trivy-report.json
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results-${{matrix.runs-on}}
          path: trivy-scan-report-${{matrix.runs-on}}.json

  build-and-deploy:
    name: build_and_deploy
    needs: [build, test, security-scan]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{secrets.RENDER_DEPLOY_HOOK_URL}}"
